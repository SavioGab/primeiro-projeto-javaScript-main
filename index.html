<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha primeira página web</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    
</head>

<body>
    <header>
        <button id="btnUsuario" class="usuario">
            <span id="textoUsuario">
                <i class="fa-regular fa-user"></i>
            </span>
        </button>

       <a href="carrinho.html" class="link-carrinho">
            <img src="IMAGEM_DO_CARRINHO_AQUI" class="carrinho">
            <span id="contadorCarrinho" class="contador-carrinho">0</span>
        </a>
    </header>

    <div class="header">  
        <h1>Cantinho da Márcia</h1>
        <p>Encontre todos os tipos de sabores e texturas para adoçar sua vida!</p>   
    </div>

    <div class="conteiner">

    </div>

    <div class="about">
        <p>Quaisquer dúvidas, entre em contato!</p>
        <a href="https://api.whatsapp.com/send?phone=5581981504904" target="_blank">
            <i class="fa-brands fa-whatsapp whatsapp"></i>
        </a>
    </div>

   <div id="loginModal" class="modal">
    <div class="modal-content">
        <span class="fechar" id="fecharLogin">&times;</span>

        <h2>Login</h2>

        <input type="email" id="emailLogin" placeholder="Digite seu e-mail">
        <input type="password" id="senhaLogin" placeholder="Digite sua senha">

        <button id="entrar">Entrar</button>

        <p>
            Não possui uma conta?
            <a href="#" id="abrirCadastro">Cadastre-se</a>
        </p>
    </div>
</div>

    <div id="cadastroModal" class="modal">
    <div class="modal-content">
        <span class="fechar" id="fecharCadastro">&times;</span>

        <h2>Criar Conta</h2>

        <input type="text" id="nomeCadastro" placeholder="Seu nome">
        <input type="email" id="emailCadastro" placeholder="Seu e-mail">
        <input type="text" id="telefoneCadastro" placeholder="Seu telefone">
        <input type="text" id="enderecoCadastro" placeholder="Bloco e apartamento">
        <input type="password" id="senhaCadastro" placeholder="Sua senha">

        <button id="cadastrar">Cadastrar</button>
    </div>
</div>

   <div id="contaModal" class="modal">
    <div class="modal-content">
        <span class="fechar" id="fecharConta">&times;</span>

        <h2>Minha Conta</h2>

        <div style="text-align:center; font-size:70px; margin-bottom:15px;">
            <i class="fa-regular fa-user"></i>
        </div>

        <p><strong>Nome:</strong> <span id="nomeConta"></span></p>
        <p><strong>Telefone:</strong> <span id="telefoneConta"></span></p>
        <p><strong>Endereço:</strong> <span id="enderecoConta"></span></p>

        <button id="btnSairConta">Sair</button>
    </div>
</div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>

</html>
